name: Manual Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest tag
        id: get-tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No git tags found"
            exit 1
          fi
          echo "Latest tag: $TAG"
          git checkout "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Delete existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "No GitHub release for $TAG yet, skipping asset cleanup"
            exit 0
          fi
          gh release view "$TAG" --json assets -q '.assets[].name' | while read -r asset; do
            echo "Deleting asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes
          done

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate --parallelism=1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.get-tag.outputs.tag }}
          GOGC: "50"
          GOMEMLIMIT: "5GiB"

      - name: Set build metadata
        id: build-meta
        run: |
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.get-tag.outputs.tag }}
          build-args: |
            BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
            COMMIT_HASH=${{ steps.build-meta.outputs.commit_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
